<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まうと話すう♥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Playfair+Display:ital@1&display=swap');

  :root {
    --pink: #f0a0c0;
    --pink-deep: #c0607a;
    --pink-light: #fde8f0;
    --black: #1a0a10;
    --dark: #2a0f1e;
    --card: rgba(30,10,20,0.85);
    --glow: 0 0 20px rgba(240,160,192,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* 背景パーティクル */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(192,96,122,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(240,160,192,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(192,96,122,0.08) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--pink);
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  /* ヘッダー */
  .header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 0;
    text-align: center;
  }

  .header-card {
    background: var(--card);
    border: 1px solid rgba(240,160,192,0.3);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    backdrop-filter: blur(10px);
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }

  .header-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
  }

  .avatar-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--pink);
    box-shadow: 0 0 16px rgba(240,160,192,0.5);
    object-fit: cover;
    background: linear-gradient(135deg, var(--pink-deep), var(--dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .name-wrap { text-align: left; }

  .name {
    font-size: 20px;
    font-weight: 700;
    color: var(--pink);
    text-shadow: 0 0 10px rgba(240,160,192,0.6);
    letter-spacing: 0.05em;
  }

  .status {
    font-size: 11px;
    color: rgba(240,160,192,0.6);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 6px #4ade80;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .tagline {
    font-size: 11px;
    color: rgba(240,160,192,0.5);
    margin-top: 10px;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* 注意書き */
  .disclaimer {
    background: rgba(192,96,122,0.1);
    border: 1px solid rgba(192,96,122,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 10px;
    color: rgba(240,160,192,0.5);
    margin-top: 12px;
    line-height: 1.6;
    text-align: left;
  }

  /* チャットエリア */
  .chat-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    flex: 1;
  }

  .chat-box {
    background: rgba(20,5,15,0.9);
    border-left: 1px solid rgba(240,160,192,0.2);
    border-right: 1px solid rgba(240,160,192,0.2);
    height: calc(100vh - 320px);
    min-height: 300px;
    overflow-y: auto;
    padding: 20px 16px;
    scroll-behavior: smooth;
  }

  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: rgba(240,160,192,0.3); border-radius: 2px; }

  /* メッセージ */
  .msg {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-deep), var(--dark));
    border: 1px solid rgba(240,160,192,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .msg.user .msg-icon {
    background: linear-gradient(135deg, #2a1a3a, #1a0a20);
    border-color: rgba(150,100,200,0.3);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: rgba(192,96,122,0.15);
    border: 1px solid rgba(240,160,192,0.25);
    color: #fde8f0;
    border-radius: 4px 16px 16px 16px;
  }

  .msg.user .bubble {
    background: rgba(100,60,140,0.2);
    border: 1px solid rgba(150,100,200,0.25);
    color: #e8ddf5;
    border-radius: 16px 4px 16px 16px;
    text-align: right;
  }

  /* タイピング */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--pink);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* 入力エリア */
  .input-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 0 20px 24px;
  }

  .input-card {
    background: var(--card);
    border: 1px solid rgba(240,160,192,0.3);
    border-radius: 0 0 20px 20px;
    padding: 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,160,192,0.2);
    border-radius: 12px;
    padding: 10px 14px;
    color: #fde8f0;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: rgba(240,160,192,0.5); }
  textarea::placeholder { color: rgba(240,160,192,0.3); }

  .send-btn {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--pink-deep), #8a3050);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(192,96,122,0.4);
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(192,96,122,0.6); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* レート制限警告 */
  .rate-warn {
    font-size: 10px;
    color: rgba(240,160,192,0.4);
    text-align: center;
    margin-top: 8px;
  }

  /* エラー */
  .error-msg {
    color: #f87171;
    font-size: 12px;
    text-align: center;
    padding: 8px;
  }

  /* スクロールヒント */
  .scroll-hint {
    font-size: 10px;
    color: rgba(240,160,192,0.3);
    text-align: center;
    padding: 6px;
  }
</style>
</head>
<body>

<!-- 星 -->
<div class="stars" id="stars"></div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-card">
    <div class="avatar-wrap">
      <div class="avatar">🐱</div>
      <div class="name-wrap">
        <div class="name">まう Mau ♥</div>
        <div class="status">
          <span class="status-dot"></span>
          <span>オンラインう</span>
        </div>
      </div>
    </div>
    <div class="tagline">"まおは、君だけの推しう♥"</div>
    <div class="disclaimer">
      ⚠️ このチャットはAIキャラクターとの会話です。18歳以上を対象としています。
      会話内容はサーバーに保存されません。緊急時は公的機関にご相談ください。
    </div>
  </div>
</div>

<!-- チャットエリア -->
<div class="chat-wrap">
  <div class="chat-box" id="chatBox">
    <div class="msg bot">
      <div class="msg-icon">🐱</div>
      <div class="bubble">
        やっと来たう…遅いう。<br>
        まあ、来てくれたから許してあげるけどう♥<br>
        何か話しかけてみてう。
      </div>
    </div>
  </div>
  <div class="scroll-hint">↑ スクロールして過去の会話を見るう</div>
</div>

<!-- 入力エリア -->
<div class="input-wrap">
  <div class="input-card">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="まうに話しかけるう…"
        rows="1"
        maxlength="500"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="rate-warn" id="rateWarn"></div>
  </div>
</div>

<script>
// ===== 設定 =====
// ★ デプロイ時にCloudflare WorkerのURLに変更してください
const WORKER_URL = 'https://mau-chat.tsuki-product.workers.dev';

// ===== レート制限（クライアント側） =====
const RATE_LIMIT = { max: 10, window: 60 * 1000 }; // 1分間に10回まで
let requestLog = [];

function checkRateLimit() {
  const now = Date.now();
  requestLog = requestLog.filter(t => now - t < RATE_LIMIT.window);
  if (requestLog.length >= RATE_LIMIT.max) {
    const wait = Math.ceil((RATE_LIMIT.window - (now - requestLog[0])) / 1000);
    return { ok: false, wait };
  }
  requestLog.push(now);
  return { ok: true };
}

// ===== 会話履歴（セッション内のみ、保存しない） =====
let history = [];

// ===== 入力サニタイズ =====
function sanitize(str) {
  return str.replace(/[<>'"&]/g, c => ({'<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;','&':'&amp;'}[c]));
}

// ===== メッセージ追加 =====
function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'bot' ? '🐱' : '🌙';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = sanitize(text).replace(/\n/g, '<br>');
  div.appendChild(icon);
  div.appendChild(bubble);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing';
  div.innerHTML = '<div class="msg-icon">🐱</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ===== 送信 =====
async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const warn = document.getElementById('rateWarn');
  const text = input.value.trim();

  if (!text) return;

  // レート制限チェック
  const rate = checkRateLimit();
  if (!rate.ok) {
    warn.textContent = `少し待ってうう… あと${rate.wait}秒`;
    setTimeout(() => warn.textContent = '', rate.wait * 1000);
    return;
  }

  warn.textContent = '';
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  // ユーザーメッセージ表示
  addMsg('user', text);

  // 履歴追加（最大10ターン保持）
  history.push({ role: 'user', content: text });
  if (history.length > 20) history = history.slice(-20);

  addTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.reply || 'うまく聞き取れなかったうう…もう一回言ってう';

    removeTyping();
    addMsg('bot', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (e) {
    removeTyping();
    addMsg('bot', 'ちょっとうまく繋がれなかったうう…ごめんう、もう一回話しかけてう');
    console.error(e);
  }

  btn.disabled = false;
  input.focus();
}

// ===== Enterキーで送信（Shift+Enterは改行） =====
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// テキストエリア自動リサイズ
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ===== 星を生成 =====
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
  s.style.setProperty('--delay', (Math.random() * 5) + 's');
  starsEl.appendChild(s);
}
</script>
</body>
</html>
