<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まうと話すう♥</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

:root {
  --pink: #f0a0c0;
  --pink-deep: #c0607a;
  --card: rgba(12,4,10,0.86);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #0a0005;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#app {
  position: relative;
  width: 100vw;
  max-width: 480px;
  height: 100vh;
  max-height: 900px;
  overflow: hidden;
}

/* ===== 背景 =====
   sprite_bg.png: 1536×1024 / 3列×2行
   各パネル: 512×512px
   background-size: 300% 200% で各パネルが画面全体に伸びる */
#bg {
  position: absolute;
  inset: 0;
  background-image: url('sprite_bg.png');
  background-size: 300% 200%;
  background-position: 0% 0%;
  background-repeat: no-repeat;
  transition: background-position 0.8s cubic-bezier(0.4,0,0.2,1);
}

#bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(8,0,12,0.2) 0%,
    rgba(8,0,12,0.05) 30%,
    rgba(8,0,12,0.4) 60%,
    rgba(8,0,12,0.93) 100%
  );
}

/* ===== 好感度ゲージ ===== */
#gauge-wrap {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  z-index: 20;
}

#gauge-label {
  font-size: 10px;
  color: rgba(240,160,192,0.7);
  margin-bottom: 3px;
  letter-spacing: 0.08em;
}

#gauge-bar-bg {
  height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid rgba(240,160,192,0.15);
}

#gauge-bar {
  height: 100%;
  width: 50%;
  background: linear-gradient(90deg, #c0607a, #f0a0c0);
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 8px rgba(240,160,192,0.4);
}

#gauge-hearts {
  margin-top: 3px;
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--pink);
}

/* ===== ヘッダー ===== */
#header {
  position: absolute;
  top: 56px;
  left: 0; right: 0;
  text-align: center;
  z-index: 20;
}

#mau-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--pink);
  text-shadow: 0 0 12px rgba(240,160,192,0.7);
}

#mau-status {
  font-size: 10px;
  color: rgba(240,160,192,0.6);
  margin-top: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 5px #4ade80;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.4); opacity: 0.7; }
}

/* ===== 免責 ===== */
#disclaimer {
  position: absolute;
  top: 96px;
  left: 12px; right: 12px;
  background: rgba(192,96,122,0.07);
  border: 1px solid rgba(192,96,122,0.18);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 9px;
  color: rgba(240,160,192,0.4);
  text-align: center;
  z-index: 20;
}

/* ===== まうの表情アイコン =====
   sprite_face.png: 1254×1254 / 4列×2行
   各パネル: 313×627px（横313, 縦627）
   顔は上半分に集中しているので上部をクロップ
   background-size: 400% 400% → 各パネルが150×150に対応
   ※ 顔を中心に表示するためy位置を調整 */
#mau-face {
  position: absolute;
  bottom: 218px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 150px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(240,160,192,0.5);
  box-shadow:
    0 0 20px rgba(240,160,192,0.4),
    0 0 50px rgba(192,96,122,0.2);
  z-index: 10;
}

/* 顔画像を内部divで制御（より正確なクロップ） */
#face-img {
  position: absolute;
  width: 400%;   /* 4列分 */
  height: 400%;  /* 2行分（縦を大きめに） */
  background-image: url('sprite_face.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  top: 0%;
  left: 0%;
  transition: left 0.35s ease, top 0.35s ease;
}

/* ===== 会話ログ ===== */
#chat-log {
  position: absolute;
  top: 130px;
  bottom: 260px;
  left: 12px; right: 12px;
  overflow-y: auto;
  z-index: 15;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 4px;
  /* まうアイコンと重なる部分は透過 */
  mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}

#chat-log::-webkit-scrollbar { width: 3px; }
#chat-log::-webkit-scrollbar-thumb { background: rgba(240,160,192,0.2); border-radius: 2px; }

.log-msg {
  display: flex;
  gap: 6px;
  animation: fadeUp 0.3s ease;
}

.log-msg.user { flex-direction: row-reverse; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.log-bubble {
  max-width: 75%;
  padding: 7px 11px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.6;
  word-break: break-word;
}

.log-msg.bot .log-bubble {
  background: rgba(192,96,122,0.12);
  border: 1px solid rgba(240,160,192,0.2);
  color: #fde8f0;
  border-radius: 4px 12px 12px 12px;
}

.log-msg.user .log-bubble {
  background: rgba(80,40,100,0.2);
  border: 1px solid rgba(150,100,200,0.2);
  color: #e8ddf5;
  border-radius: 12px 4px 12px 12px;
  text-align: right;
}

.log-icon {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(192,96,122,0.2);
  border: 1px solid rgba(240,160,192,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  align-self: flex-end;
}

/* ===== テキストボックス（現在のまうの発言） ===== */
#textbox {
  position: absolute;
  bottom: 106px;
  left: 12px; right: 12px;
  background: var(--card);
  border: 1px solid rgba(240,160,192,0.28);
  border-radius: 12px;
  padding: 10px 14px;
  z-index: 20;
  backdrop-filter: blur(8px);
}

#textbox::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,160,192,0.35), transparent);
}

#speaker {
  font-size: 11px;
  font-weight: 700;
  color: var(--pink);
  margin-bottom: 4px;
}

#dialogue {
  font-size: 13px;
  line-height: 1.7;
  color: #fde8f0;
  min-height: 40px;
}

#cursor {
  display: inline-block;
  width: 7px; height: 12px;
  background: var(--pink);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ===== 入力エリア ===== */
#input-area {
  position: absolute;
  bottom: 18px;
  left: 12px; right: 12px;
  z-index: 20;
  display: flex;
  gap: 8px;
}

#player-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(240,160,192,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  color: #fde8f0;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

#player-input:focus { border-color: rgba(240,160,192,0.5); }
#player-input::placeholder { color: rgba(240,160,192,0.3); }
#player-input:disabled { opacity: 0.4; }

#send-btn {
  background: linear-gradient(135deg, var(--pink-deep), #8a3050);
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  color: white;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 12px rgba(192,96,122,0.35);
  white-space: nowrap;
}

#send-btn:hover { transform: scale(1.04); }
#send-btn:active { transform: scale(0.96); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ===== シーンラベル ===== */
#scene-label {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 9px;
  color: rgba(240,160,192,0.45);
  z-index: 20;
}

/* ===== タイピングドット ===== */
.typing-dots {
  display: inline-flex;
  gap: 4px;
  vertical-align: middle;
}

.typing-dots span {
  width: 5px; height: 5px;
  background: var(--pink);
  border-radius: 50%;
  animation: dotB 1.2s ease-in-out infinite;
  opacity: 0.6;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotB {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); opacity: 1; }
}
</style>
</head>
<body>
<div id="app">
  <div id="bg"></div>

  <div id="gauge-wrap">
    <div id="gauge-label">❤ まうの好感度</div>
    <div id="gauge-bar-bg"><div id="gauge-bar"></div></div>
    <div id="gauge-hearts"></div>
  </div>

  <div id="scene-label"></div>

  <div id="header">
    <div id="mau-name">まう Mau ♥</div>
    <div id="mau-status"><span class="dot"></span><span>オンラインう</span></div>
  </div>

  <div id="disclaimer">⚠️ AIキャラクターとの会話です。18歳以上対象。会話内容は保存されません。</div>

  <!-- 会話ログ -->
  <div id="chat-log"></div>

  <!-- まうアイコン -->
  <div id="mau-face"><div id="face-img"></div></div>

  <!-- 現在のセリフ -->
  <div id="textbox">
    <div id="speaker">まう 🐱</div>
    <div id="dialogue"></div>
  </div>

  <div id="input-area">
    <input type="text" id="player-input" placeholder="まうに話しかけるう…" maxlength="200">
    <button id="send-btn" onclick="sendMessage()">送るう♥</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://mau-chat.tsuki-product.workers.dev';

// ===== 背景スプライト =====
// sprite_bg.png: 1536×1024 / 3列×2行
// background-size: 300% 200% のとき各パネルが画面全体に表示される
const BG_POS = {
  default:  { x:'0%',   y:'0%',   label:'🏠 まうの部屋' },
  pachinko: { x:'50%',  y:'0%',   label:'🎰 パチスロ' },
  mystery:  { x:'100%', y:'0%',   label:'🔍 都市伝説' },
  bar:      { x:'0%',   y:'100%', label:'🥃 バー' },
  tech:     { x:'50%',  y:'100%', label:'🤖 AI' },
  kawaii:   { x:'100%', y:'100%', label:'🧸 かわいい' },
};

// ===== 表情スプライト =====
// sprite_face.png: 1254×1254 / 4列×2行
// face-img は width:400% height:400% で全体を表示
// 各パネル選択: left = -col*100%, top = -row*100%
const FACE_POS = {
  normal:    { col:0, row:0 },
  happy:     { col:1, row:0 },
  angry:     { col:2, row:0 },
  flustered: { col:3, row:0 },
  sulking:   { col:0, row:1 },
  shocked:   { col:1, row:1 },
  sad:       { col:2, row:1 },
  dere:      { col:3, row:1 },
};

// ===== キーワード判定 =====
const BG_KEYWORDS = {
  pachinko: ['パチスロ','パチンコ','スロット','777','ボーナス','リール','台','玉','メダル'],
  mystery:  ['都市伝説','未解決','事件','怖い','ミステリー','謎','呪い','幽霊','UFO','陰謀'],
  bar:      ['お酒','飲む','ウイスキー','酔う','バー','一杯','ビール','ワイン'],
  tech:     ['AI','人工知能','テクノロジー','プログラム','未来','ロボット','データ'],
  kawaii:   ['かわいい','ぬいぐるみ','キャラ','グッズ','推し','フィギュア'],
};

let affection = 50;
let history = [];
let isWaiting = false;
let requestLog = [];

function checkRateLimit() {
  const now = Date.now();
  requestLog = requestLog.filter(t => now - t < 60000);
  if (requestLog.length >= 15) return false;
  requestLog.push(now);
  return true;
}

function updateGauge() {
  const pct = Math.max(0, Math.min(100, affection));
  document.getElementById('gauge-bar').style.width = pct + '%';
  const filled = Math.round(pct / 10);
  document.getElementById('gauge-hearts').textContent = '♥'.repeat(filled) + '♡'.repeat(10 - filled);
  const bar = document.getElementById('gauge-bar');
  if (pct >= 70) bar.style.background = 'linear-gradient(90deg,#e060a0,#ffb0d0)';
  else if (pct <= 30) bar.style.background = 'linear-gradient(90deg,#802040,#c04060)';
  else bar.style.background = 'linear-gradient(90deg,#c0607a,#f0a0c0)';
}

function setBg(scene) {
  const p = BG_POS[scene] || BG_POS.default;
  document.getElementById('bg').style.backgroundPosition = `${p.x} ${p.y}`;
  document.getElementById('scene-label').textContent = p.label;
}

function setFace(emotion) {
  const p = FACE_POS[emotion] || FACE_POS.normal;
  const img = document.getElementById('face-img');
  img.style.left = (-p.col * 100) + '%';
  img.style.top  = (-p.row * 100) + '%';
}

function detectBg(text) {
  for (const [scene, kws] of Object.entries(BG_KEYWORDS)) {
    if (kws.some(kw => text.includes(kw))) return scene;
  }
  return null;
}

function getFaceFromAffection(delta) {
  if (delta >= 15) return 'happy';
  if (delta <= -15) return 'angry';
  if (affection >= 85) return 'dere';
  if (affection >= 70) return 'happy';
  if (affection <= 15) return 'angry';
  if (affection <= 30) return 'sulking';
  return 'normal';
}

// ===== 会話ログに追加 =====
function addLog(role, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = `log-msg ${role}`;
  const icon = document.createElement('div');
  icon.className = 'log-icon';
  icon.textContent = role === 'bot' ? '🐱' : '🌙';
  const bubble = document.createElement('div');
  bubble.className = 'log-bubble';
  bubble.textContent = text;
  div.appendChild(icon);
  div.appendChild(bubble);
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ===== タイプライター =====
let typeTimer = null;
function typeText(text, onDone) {
  const el = document.getElementById('dialogue');
  el.innerHTML = '';
  let i = 0;
  clearInterval(typeTimer);
  typeTimer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i++];
    } else {
      clearInterval(typeTimer);
      el.innerHTML += '<span id="cursor"></span>';
      if (onDone) onDone();
    }
  }, 28);
}

function showTyping() {
  document.getElementById('dialogue').innerHTML =
    '<span class="typing-dots"><span></span><span></span><span></span></span>';
}

// ===== 送信 =====
async function sendMessage() {
  if (isWaiting) return;
  if (!checkRateLimit()) { typeText('少し待ってうう…'); return; }

  const input = document.getElementById('player-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.disabled = true;
  btn.disabled = true;
  isWaiting = true;

  addLog('user', text);

  const detectedBg = detectBg(text);
  if (detectedBg) setBg(detectedBg);

  history.push({ role: 'user', content: text });
  if (history.length > 16) history = history.slice(-16);

  showTyping();
  setFace('normal');

  try {
    const sys = `現在の好感度: ${affection}/100
返答の最後に必ずJSON1行を追加: {"delta": 数値(-20〜+20), "emotion": "感情名"}
emotionは: normal / happy / angry / flustered / sulking / shocked / sad / dere から選ぶ`;

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          ...history.slice(-10),
          { role: 'user', content: text + '\n\n[system]: ' + sys }
        ]
      })
    });

    const data = await res.json();
    let reply = data.reply || 'うまく聞こえなかったうう…';

    let delta = 0, emotion = null;
    const m = reply.match(/\{"delta":\s*(-?\d+),\s*"emotion":\s*"([^"]+)"\}/);
    if (m) {
      delta = parseInt(m[1]);
      emotion = m[2];
      reply = reply.replace(/\{"delta":\s*(-?\d+),\s*"emotion":\s*"([^"]+)"\}/, '').trim();
    }

    affection = Math.max(0, Math.min(100, affection + delta));
    updateGauge();
    setFace(emotion || getFaceFromAffection(delta));

    const replyBg = detectBg(reply);
    if (replyBg && !detectedBg) setBg(replyBg);

    history.push({ role: 'assistant', content: reply });

    typeText(reply, () => {
      addLog('bot', reply);
      isWaiting = false;
      input.disabled = false;
      btn.disabled = false;
      input.focus();
    });

  } catch (e) {
    const errMsg = 'ちょっと繋がれなかったうう…もう一回して';
    typeText(errMsg, () => {
      addLog('bot', errMsg);
      isWaiting = false;
      input.disabled = false;
      btn.disabled = false;
    });
  }
}

document.getElementById('player-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
});

// ===== 初期化 =====
updateGauge();
setBg('default');
setFace('normal');
const opening = '…来たうう。まあ、入っていいうう。\nで、何の話するう？';
typeText(opening, () => {
  addLog('bot', opening);
  document.getElementById('player-input').focus();
});
</script>
</body>
</html>
